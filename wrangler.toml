name = "nuclear-plant-sim"
main = "src/index.js"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "PLANT_STATE", class_name = "PlantState" }
]

[[migrations]]
tag = "v1"
new_classes = ["PlantState"]

[[d1_databases]]
binding = "DB"
database_name = "nuclear_plant_db"
database_id = "__D1_ID__"
